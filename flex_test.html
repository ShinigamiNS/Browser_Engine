<html>
<head>
<style>
  body { background-color: #f0f0f0; margin: 20px; }
  .container {
    display: flex;
    background-color: #ffffff;
    padding: 20px;
    border: 1px solid #ccc;
  }
  .box {
    width: 100px;
    height: 50px;
    margin: 10px;
    background-color: #3498db;
    color: white;
    text-align: center;
    line-height: 50px;
  }
  .red { background-color: #e74c3c; }
  .green { background-color: #2ecc71; }
</style>
</head>
<body>
  <h1>Flexbox Test</h1>
  <div class="container">
    <div class="box">Box 1</div>
    <div class="box red">Box 2</div>
    <div class="box green">Box 3</div>
  </div>
</body>
</html>

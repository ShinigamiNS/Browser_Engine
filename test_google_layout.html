        BUTTON { padding: 10px 20px; background-color: #5082ff; color: white; border: none; }

    <div>

        <input type="text" style="width: 400px; padding: 10px; margin: 10px;" value="Search...">

            <button>I'm Feeling Lucky</button>
        </div>
    </div>

</html>
